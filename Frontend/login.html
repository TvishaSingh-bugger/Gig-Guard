<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f2027,#2c5364);
    display:flex;
    flex-direction:column;
    align-items:center;
}

.header {
    color:white;
    font-size:28px;
    margin-top:30px;
    letter-spacing:1px;
    font-weight:600;
}

.card {
    background:white;
    margin-top:40px;
    padding:40px;
    width:360px;
    border-radius:20px;
    box-shadow:0 25px 60px rgba(0,0,0,0.5);
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
}

h2 {
    text-align:center;
    margin-bottom:25px;
}

label {
    font-weight:600;
    font-size:14px;
}

input {
    width:100%;
    padding:12px;
    margin:8px 0 18px;
    border-radius:10px;
    border:1px solid #ccc;
}

input:focus {
    border-color:#2c5364;
    outline:none;
    box-shadow:0 0 10px rgba(44,83,100,0.5);
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    background:linear-gradient(135deg,#2c5364,#1e3c50);
    color:white;
    border:none;
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
}

button:hover {
    transform:scale(1.04);
}

/* ERROR */
.error {
    color:red;
    text-align:center;
    font-size:14px;
}

/* LINK */
.link {
    text-align:center;
    margin-top:15px;
}

.link a {
    text-decoration:none;
    color:#2c5364;
    font-weight:600;
}

</style>
</head>

<body>

<div class="header">Gig-Guard | Parametric Insurance</div>

<div class="card">
<h2>Login</h2>

<form method="POST">
<label>Username</label>
<input name="username" placeholder="Enter username" required>

<label>Password</label>
<input name="password" type="password" placeholder="Enter password" required>

<button>Login</button>
</form>

<p class="error">{{ error }}</p>

<div class="link">
<a href="/register">Create Account</a>
</div>

</div>

</body>
</html>
